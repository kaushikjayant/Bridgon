
<h2 class="sr-only">Non-RTL parameter database update workflow showing four trigger scenarios and the contribution PR pipeline</h2>
<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
<svg width="100%" viewBox="0 0 680 780" role="img">
  <title>Non-RTL parameter DB update workflow</title>
  <desc>Four trigger scenarios feed into a gap analysis step, which generates a contribution YAML, which goes through a PR review and validation before merging into the JSON database.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- TRIGGER column label -->
  <text class="ts" x="100" y="28" text-anchor="middle">Triggers</text>
  <!-- PIPELINE column label -->
  <text class="ts" x="430" y="28" text-anchor="middle">Contribution pipeline</text>

  <!-- Divider -->
  <line x1="220" y1="18" x2="220" y2="762" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ── TRIGGER 1: new param in .prm ── -->
  <g class="node c-amber">
    <rect x="20" y="48" width="180" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="110" y="68" text-anchor="middle" dominant-baseline="central">New param in .prm</text>
    <text class="ts" x="110" y="86" text-anchor="middle" dominant-baseline="central">source=non-rtl detected</text>
  </g>

  <!-- ── TRIGGER 2: new SoC/SS in memmap ── -->
  <g class="node c-teal">
    <rect x="20" y="124" width="180" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="110" y="144" text-anchor="middle" dominant-baseline="central">New SoC·SS in memmap</text>
    <text class="ts" x="110" y="162" text-anchor="middle" dominant-baseline="central">XLSX row added or changed</text>
  </g>

  <!-- ── TRIGGER 3: param removed ── -->
  <g class="node c-coral">
    <rect x="20" y="200" width="180" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="110" y="220" text-anchor="middle" dominant-baseline="central">Param removed from .prm</text>
    <text class="ts" x="110" y="238" text-anchor="middle" dominant-baseline="central">orphaned DB entries</text>
  </g>

  <!-- ── TRIGGER 4: IP removed from SoC ── -->
  <g class="node c-gray">
    <rect x="20" y="276" width="180" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="110" y="296" text-anchor="middle" dominant-baseline="central">IP removed from SoC·SS</text>
    <text class="ts" x="110" y="314" text-anchor="middle" dominant-baseline="central">XLSX row deleted</text>
  </g>

  <!-- Arrows from triggers to gap analysis -->
  <line x1="200" y1="74" x2="244" y2="210" class="arr" stroke="var(--color-border-secondary)" marker-end="url(#arrow)" fill="none"/>
  <line x1="200" y1="150" x2="244" y2="218" class="arr" stroke="var(--color-border-secondary)" marker-end="url(#arrow)" fill="none"/>
  <line x1="200" y1="226" x2="244" y2="230" class="arr" stroke="var(--color-border-secondary)" marker-end="url(#arrow)" fill="none"/>
  <line x1="200" y1="302" x2="244" y2="258" class="arr" stroke="var(--color-border-secondary)" marker-end="url(#arrow)" fill="none"/>

  <!-- ── CI HOOK ── -->
  <g class="node c-gray">
    <rect x="240" y="178" width="160" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="198" text-anchor="middle" dominant-baseline="central">CI hook</text>
    <text class="ts" x="320" y="216" text-anchor="middle" dominant-baseline="central">.prm + XLSX diff on commit</text>
  </g>

  <!-- Arrow: CI → gap analyzer -->
  <line x1="320" y1="230" x2="320" y2="270" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>

  <!-- ── GAP ANALYZER ── -->
  <g class="node c-purple">
    <rect x="240" y="270" width="160" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="292" text-anchor="middle" dominant-baseline="central">Gap analyzer</text>
    <text class="ts" x="320" y="310" text-anchor="middle" dominant-baseline="central">diff .prm vs DB entries</text>
    <text class="ts" x="320" y="324" text-anchor="middle" dominant-baseline="central">per SoC·instance</text>
  </g>

  <!-- Arrow: gap → decision diamond -->
  <line x1="320" y1="334" x2="320" y2="374" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>

  <!-- ── DECISION: gaps or orphans? ── -->
  <polygon points="320,374 380,404 320,434 260,404" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="ts" x="320" y="400" text-anchor="middle" dominant-baseline="central">gaps or</text>
  <text class="ts" x="320" y="416" text-anchor="middle" dominant-baseline="central">orphans?</text>

  <!-- no-gap path (right) -->
  <line x1="380" y1="404" x2="490" y2="404" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-tertiary)"/>
  <text class="ts" x="435" y="396" text-anchor="middle">none</text>
  <g class="c-teal">
    <rect x="490" y="382" width="120" height="44" rx="6" stroke-width="0.5"/>
    <text class="ts" x="550" y="404" text-anchor="middle" dominant-baseline="central">no action — done</text>
  </g>

  <!-- gap path (down) -->
  <line x1="320" y1="434" x2="320" y2="474" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>
  <text class="ts" x="340" y="456" text-anchor="start">gaps/orphans</text>

  <!-- ── CONTRIBUTION YAML ── -->
  <g class="node c-blue">
    <rect x="240" y="474" width="160" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="494" text-anchor="middle" dominant-baseline="central">Contribution YAML</text>
    <text class="ts" x="320" y="512" text-anchor="middle" dominant-baseline="central">empty slots per instance</text>
    <text class="ts" x="320" y="526" text-anchor="middle" dominant-baseline="central">auto-assigned to authors</text>
  </g>

  <!-- Chip-variant side note -->
  <g class="node c-gray">
    <rect x="476" y="484" width="168" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="560" y="500" text-anchor="middle" dominant-baseline="central">copy-from directive</text>
    <text class="ts" x="560" y="516" text-anchor="middle" dominant-baseline="central">inherit parent chip values</text>
  </g>
  <line x1="400" y1="506" x2="474" y2="506" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-tertiary)" stroke-dasharray="4 3"/>
  <text class="ts" x="437" y="498" text-anchor="middle">chip variant</text>

  <!-- Arrow: YAML → PR -->
  <line x1="320" y1="538" x2="320" y2="578" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>

  <!-- ── PULL REQUEST ── -->
  <g class="node c-blue">
    <rect x="240" y="578" width="160" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="598" text-anchor="middle" dominant-baseline="central">Pull request</text>
    <text class="ts" x="320" y="616" text-anchor="middle" dominant-baseline="central">db-contributions/ branch</text>
  </g>

  <!-- Arrow: PR → schema validation -->
  <line x1="320" y1="630" x2="320" y2="666" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>

  <!-- ── SCHEMA VALIDATION ── -->
  <g class="node c-purple">
    <rect x="240" y="666" width="160" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="686" text-anchor="middle" dominant-baseline="central">Schema validation</text>
    <text class="ts" x="320" y="704" text-anchor="middle" dominant-baseline="central">type · range · enum check</text>
  </g>

  <!-- fail path (left) -->
  <line x1="240" y1="692" x2="180" y2="692" class="arr" marker-end="url(#arrow)" fill="none" stroke="#E24B4A" stroke-dasharray="4 3"/>
  <text class="ts" x="209" y="684" text-anchor="middle">fail</text>
  <g class="c-coral">
    <rect x="20" y="672" width="160" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="100" y="692" text-anchor="middle" dominant-baseline="central">PR blocked — author fixes</text>
  </g>

  <!-- pass path -->
  <line x1="320" y1="718" x2="320" y2="748" class="arr" marker-end="url(#arrow)" fill="none" stroke="var(--color-border-secondary)"/>
  <text class="ts" x="340" y="735" text-anchor="start">pass + reviewed</text>

  <!-- ── DB MERGE ── -->
  <g class="node c-teal">
    <rect x="240" y="748" width="160" height="28" rx="6" stroke-width="0.5"/>
    <text class="th" x="320" y="762" text-anchor="middle" dominant-baseline="central">DB merge — done</text>
  </g>

</svg>
